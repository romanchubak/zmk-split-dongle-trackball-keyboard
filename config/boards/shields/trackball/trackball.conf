CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y
CONFIG_PMW3610_ALT=y
# --- USB logging for trackball diagnostics ---
# The XIAO board defconfig disables SERIAL/CONSOLE to save power, but
# ZMK_USB_LOGGING `select`s the USB CDC-ACM serial stack. We must turn the
# serial/console stack back on explicitly or the build aborts on a Kconfig
# "y-selected but dependency is n" warning.
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_ZMK_USB_LOGGING=y
CONFIG_PMW3610_ALT_LOG_LEVEL_DBG=y

UART_INTERRUPT_DRIVEN=y
UART_CONSOLE=y
ZMK_USB_LOGGING=y
USB_CDC_ACM=y

